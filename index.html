<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدربك اليومي</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    text-align: center;
    margin: 0;
}

.container {
    background: white;
    width: 90%;
    max-width: 420px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #219150;
}

.task {
    background: #ecf0f1;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
}

.done {
    background: #d4edda;
}
</style>
</head>

<body>

<div class="container">
<h2>🏋️ مدربك اليومي</h2>

<p>اختر هدفك:</p>
<select id="goal">
<option value="">اختر</option>
<option value="weight">تخسيس</option>
<option value="muscle">بناء عضلات</option>
<option value="fitness">لياقة عامة</option>
</select>

<button onclick="generateTasks()">إنشاء مهام اليوم</button>

<div id="tasks"></div>

<h3>✅ إنجاز اليوم</h3>
<p id="progress">0 / 0</p>
</div>

<script>
let tasksList = [];

function generateTasks(){
let goal = document.getElementById("goal").value;

if(!goal){
alert("اختر هدفك أولاً");
return;
}

if(goal === "weight"){
tasksList = ["جري 10 دقائق","سكوات 20 عدة","تمارين بطن 15 عدة"];
}
else if(goal === "muscle"){
tasksList = ["تمرين ضغط 15 عدة","تمرين صدر","تمرين ذراع"];
}
else{
tasksList = ["قفز حبل 5 دقائق","بلانك 30 ثانية","تمارين توازن"];
}

renderTasks();
saveData();
}

function renderTasks(){
let container = document.getElementById("tasks");
container.innerHTML = "";

tasksList.forEach((task, index) => {
let div = document.createElement("div");
div.className = "task";
if(task.startsWith("✔")) div.classList.add("done");

div.innerHTML = task + "<br><button onclick='completeTask("+index+")'>تم التنفيذ</button>";
container.appendChild(div);
});

updateProgress();
}

function completeTask(index){
if(!tasksList[index].startsWith("✔")){
tasksList[index] = "✔ " + tasksList[index];
}
renderTasks();
saveData();
}

function updateProgress(){
let done = tasksList.filter(t => t.startsWith("✔")).length;
document.getElementById("progress").innerText = done + " / " + tasksList.length;
}

function saveData(){
localStorage.setItem("tasks", JSON.stringify(tasksList));
}

function loadData(){
let data = localStorage.getItem("tasks");
if(data){
tasksList = JSON.parse(data);
renderTasks();
}
}

loadData();
</script>

</body>
</html>
